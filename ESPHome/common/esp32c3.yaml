# base configuration for esp32c3 boards
esphome:
  name: ${name}
  comment: ${device_description}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  project:
    name: "erkr.esphome-device-configs"
    version: "${version}"
  min_version: "${min_version}"

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

# Enable logging
logger:
  id: logger_cfg
  baud_rate: 0  # disable serial uart logging
  #level: VERBOSE
  
mdns:
  disabled: false
  
# Enable Home Assistant API
api:

ota:
  platform: esphome

wifi:
  id: wifi_id
  # ssid: !secret wifi_ssid
  # password: !secret wifi_password
  ap:
    ssid: "${name}"
    ap_timeout: 10min # cannot be 0, if no wifi a reset will occur after this timeout
    
# Define the onboard BOOT button as a binary sensor
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true                 # BOOT button connects to GND when pressed
      mode: INPUT_PULLUP
    name: "Onboard Boot Button"
    on_press:
      then:
        - lambda: |-
            // Activate the Captive Portal access point manually
            id(my_captive_portal).begin();
            ESP_LOGD("main", "Captive Portal started. Connect to ESP network.");

# add the captive portal 
captive_portal:
  id: my_captive_portal

web_server:
  port: 80
  # auth:
    # username: !secret web_server_username
    # password: !secret web_server_password

status_led:
  id: status_led_id
  pin:
    number: GPIO8
    inverted: true    

binary_sensor:
  - platform: status
    id: status_sensor
    name: "Connection Status"

sensor:
  - platform: uptime
    # The uptime sensor is extremely helpful to know if your device is rebooting
    # when it shouldn't be. This might indicate your interval-to-window timing is
    # too tight, and the window needs to be reduced.
    id: uptime_sensor
    name: "Uptime Sensor"
    update_interval: 60s

button:
  - platform: restart
    id: restart_button
    name: Restart 

  - platform: factory_reset
    id: factory_reset_button
    name: Factory reset
    disabled_by_default: true
    
