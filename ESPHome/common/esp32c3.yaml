# base configuration for esp32c3 boards
esphome:
  name: ${name}
  comment: ${device_description}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  project:
    name: "erkr.esphome-device-configs"
    version: "${version}"
  min_version: 2026.4.0

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

# Enable logging
logger:
  baud_rate: 0  # disable serial uart logging
  #level: VERBOSE
  
mdns:
  disabled: false

  
# Enable Home Assistant API
api:

ota:
  platform: esphome
  
wifi:
  # ssid: !secret wifi_ssid
  # password: !secret wifi_password
  ap:
    ssid: "BT Fallback Hotspot"
    ap_timeout: 10min # cannot be 0, if no wifi a reset will occur after this timeout

captive_portal:

web_server:
  port: 80
  # auth:
    # username: !secret web_server_username
    # password: !secret web_server_password

binary_sensor:
  - platform: status
    name: "Connection Status"

sensor:
  - platform: uptime
    # The uptime sensor is extremely helpful to know if your device is rebooting
    # when it shouldn't be. This might indicate your interval-to-window timing is
    # too tight, and the window needs to be reduced.
    name: "Uptime Sensor"
    update_interval: 60s

button:
  - platform: restart
    name: Restart 

  - platform: factory_reset
    name: Factory reset