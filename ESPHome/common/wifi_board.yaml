# enables status led (blink when no connection)
# adds buttons for a restart or factory reset to the API
# adds Web server and OTA
# enables the on board boot button (press 5-15 seconds to perform a factory reset)

  
mdns:
  disabled: false
  
# Enable logging
logger:
  id: logger_cfg
  baud_rate: 0  # disable serial uart logging
  #level: VERBOSE

ota:
  platform: esphome

wifi:
  id: wifi_id
  # When including WiFI credentials, factory reset will not raise a Captive Portal!!!
  # ssid: !secret wifi_ssid
  # password: !secret wifi_password
  ap:
    #ssid: 
    ap_timeout: 1d # cannot be 0, if wifi is configured, but board fails to connect a reset into AP will occur after this timeout
    

# add the captive portal 
captive_portal:
  id: captive_portal_id

web_server:
  port: 80
  # auth: 
    # username: !secret web_server_username
    # password: !secret web_server_password

status_led:
  id: status_led_id
  pin:
    number: $LED_GPIO
    inverted: true    

binary_sensor:
  - platform: status
    id: status_sensor
    name: "Connection Status" 
  - platform: gpio   # Define the onboard BOOT button as a binary sensor
    pin:
      number: $BOOT_GPIO
      inverted: true              
      mode: INPUT_PULLUP
    name: "Onboard Boot Button"
    id: onboard_boot_button
    internal: true
    on_click:
#      - min_length: 2000ms
#        max_length: 4000ms
#        then:
#          - logger.log:  "Boot pressed 2-4s: Clear Configured WiFi and start AP"
#          - delay: 0.5s
#          - How?
      - min_length: 5000ms
        max_length: 15000ms
        then:
          - logger.log:  "Boot pressed 5-15s: Factory Reset and Reboot"
          - delay: 0.5s
          - button.press: factory_reset_button
  
sensor:
  - platform: uptime
    # The uptime sensor is extremely helpful to know if your device is rebooting
    # when it shouldn't be. This might indicate your interval-to-window timing is
    # too tight, and the window needs to be reduced.
    id: uptime_sensor
    name: "Uptime Sensor"
    update_interval: 60s

button:
  - platform: restart
    id: restart_button
    name: Restart 

  - platform: factory_reset
    id: factory_reset_button
    name: Factory reset
    disabled_by_default: true
    
