# my base config for a BT proxy using esp32c3
substitutions:
  name: bluetooth-test
  friendly_name: BT-Test
  version: "26.7.0.0"
  device_description: BT-Test. version ${version}. Made by ErKr.
  min_version: "26.4.0"

packages:
