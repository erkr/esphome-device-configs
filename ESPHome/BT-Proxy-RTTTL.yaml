# BT proxy using esp32c3 with additional RTTTL support on GPIO 0
substitutions:
  name: bluetooth-proxy-rtttl
  friendly_name: BT-Proxy-rtttl
  version: "26.7.0.0"
  device_description: BT Proxy with RTTTL - made by ErKr - version ${version}.

esphome:
  name: ${name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  project:
    name: "erkr.esphome-device-configs"
    version: "${version}"

  min_version: 2026.4.0

dashboard_import:
  package_import_url: github://erkr/esphome-device-configs/ESPHome/BT-Proxy-RTTTL.yaml@main
  import_full_config: false


esp32:
  variant: esp32c3
  framework:
    type: esp-idf
    sdkconfig_options:
      # @grigi found in testing that these options resulted in better responsiveness.
      # BLE 4.2 is supported by ALL ESP32 boards that have bluetooth, the original and derivatives.
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      # Also enable this on any derivative boards (S2, C3 etc) but not the original ESP32.
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: y
      # Extend the watchdog timeout, so the device reboots if the device appears locked up for over 10 seconds.
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"



# Enable logging
logger:
  baud_rate: 0  # disable serial uart logging
  #level: VERBOSE
  
mdns:
  disabled: false

# Configure the output
output:
  - platform: ledc
    ######################################################
    # One buzzer leg connected to GPIO0 (pin 0 esp32 c3 mini), the other to GND
    ######################################################
    pin: GPIO0
    id: rtttl_out
    max_power: 100%

rtttl:
  output: rtttl_out
  on_finished_playback:
    - logger.log: 'Song ended!'
  
# Enable Home Assistant API
api:
  # Only enable BLE tracking when wifi is up and api is connected
  # Gives single-core ESP32-C3 devices time to manage wifi and authenticate with api
  on_client_connected:
     - esp32_ble_tracker.start_scan:
        continuous: true
  # Disable BLE tracking when there are no api connections live
  on_client_disconnected:
    if:
      condition:
        not:
          api.connected:
      then:
        - esp32_ble_tracker.stop_scan:
  actions:
    - action: rtttl_play
      variables:
        song: string
        volume: int # 1-100; 0 means unset
      then:
        - lambda: "id(script_rtttl_play).execute(song, volume);"
    - action: rtttl_stop
      then:
        - rtttl.stop

script:
  - id: script_rtttl_play
    parameters:
      song: string
      volume: int # 1-100; 0 means unset
    mode: single
    then:
      - if:
          condition:
            rtttl.is_playing # abort current 
          then:
            - rtttl.stop
            - delay: 0.1s
      # - lambda: |-
      #     ESP_LOGI("app", "script_rtttl_play - %s, %d", song.c_str(), volume);
      - lambda: |-
          float volume_f = (volume>0) ? ((float)clamp(volume, 0, 100))/100.0f : 1.0f;
          id(rtttl_out).set_max_power(volume_f);
      - rtttl.play:
           rtttl: !lambda 'return (song.find('':'') == std::string::npos) ? ("song:d=16,o=5,b=100:" + song).c_str() : song.c_str();'


ota:
  platform: esphome
  
wifi:
  # ssid: !secret wifi_ssid
  # password: !secret wifi_password
  ap:
    ssid: "BT Fallback Hotspot"
    ap_timeout: 10min # cannot be 0, if no wifi a reset will occur after this timeout

captive_portal:

web_server:
  port: 80
  # auth:
    # username: !secret web_server_username
    # password: !secret web_server_password

esp32_ble_tracker:
  scan_parameters:
    # Don't auto start BLE scanning, we control it in the `api` block's automation.
    continuous: False
    active: False  # send scan-request packets to gather more info, like device name for some devices.
    interval: 320ms  # default 320ms - how long to spend on each advert channel
    window:   250ms  # default 30ms - how long to actually "listen" in each interval. Reduce this if device is unstable.
    # If the device cannot keep up or becomes unstable, reduce the "window" setting. This may be
    # required if your device is controlling other sensors or doing PWM for lights etc.


bluetooth_proxy:
  active: true

binary_sensor:
  - platform: status
    name: "Connection Status"

sensor:
  - platform: uptime
    # The uptime sensor is extremely helpful to know if your device is rebooting
    # when it shouldn't be. This might indicate your interval-to-window timing is
    # too tight, and the window needs to be reduced.
    name: "Uptime Sensor"
    update_interval: 60s

button:
  - platform: restart
    name: Restart 
  - platform: factory_reset
    name: Factory reset
  - platform: template
    name: Buzzer Test Button
    icon: mdi:button-pointer
    on_press:
       - lambda: |-
          std::string song = "Cat:d=16,o=6,b=95:32d,32d#,32d,32d#";
          id(script_rtttl_play).execute(song.c_str(), 100);
 #     - rtttl.play: "Cat:d=16,o=6,b=95:32d,32d#,32d,32d#"
    entity_category: diagnostic


